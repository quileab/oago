$kind: http-request
name: Change Product Visibility
method: PUT
url: '{{base_url}}/api/products/{{product_id}}/visibility'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "visibility": "visible",
      "sku": "SKU-001"
    }
