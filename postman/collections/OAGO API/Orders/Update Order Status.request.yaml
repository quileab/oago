$kind: http-request
name: Update Order Status
method: PUT
url: '{{base_url}}/api/orders/{{order_id}}/status'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "processing"
    }
