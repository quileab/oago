$kind: http-request
name: Update List Price
method: PUT
url: '{{base_url}}/api/list-prices/{{product_id}}/{{list_id}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "price": 79.99,
      "unit_price": 8.99
    }
